services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: task_tracker
      POSTGRES_USER: task_tracker
      POSTGRES_PASSWORD: task_tracker
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U task_tracker -d task_tracker"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      target: runner
    command: npm run dev
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules

  worker:
    build:
      context: .
      target: runner
    command: npm run worker:start
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  postgres-data:
