name: Deploy

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  NODE_VERSION: "26"

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

  build:
    name: Build image
    needs: check
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.version.outputs.image-tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: version
        run: echo "image-tag=sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runner
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.image-tag }}
            ${{ env.IMAGE_NAME }}:main
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Docker host
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on:
      - self-hosted
      - linux
      - docker-host-deploy
    timeout-minutes: 15
    env:
      DEPLOY_SSH_TARGET: ${{ vars.DEPLOY_SSH_TARGET }}
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
      TASK_TRACKER_IMAGE: ghcr.io/${{ github.repository }}
      TASK_TRACKER_TAG: ${{ needs.build.outputs.image-tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy variables
        run: |
          test -n "$DEPLOY_SSH_TARGET"
          test -n "$DEPLOY_PATH"

      - name: Deploy
        run: scripts/deploy/docker-host-deploy.sh
