name: task-tracker

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-task_tracker}
      POSTGRES_USER: ${POSTGRES_USER:-task_tracker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-task_tracker} -d ${POSTGRES_DB:-task_tracker}"
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    image: ${TASK_TRACKER_IMAGE:?Set TASK_TRACKER_IMAGE in .env}:${TASK_TRACKER_TAG:-main}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ${APP_ENV_FILE:-.env}
    environment:
      NODE_ENV: production
    ports:
      - "${APP_PORT:-3000}:3000"

  worker:
    image: ${TASK_TRACKER_IMAGE:?Set TASK_TRACKER_IMAGE in .env}:${TASK_TRACKER_TAG:-main}
    command: npm run worker:start
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ${APP_ENV_FILE:-.env}
    environment:
      NODE_ENV: production

volumes:
  postgres-data:
